<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="css/Amazon.css">
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="logo">
                <img src="images/amazon-logo-white.png" alt="Amazon-Logo">
            </div>
            <div class="search">
                <input type="text" placeholder="Search">
                <button>
                    <img src="images/icons/search-icon.png" alt="Search" class="search-icon">
                </button>
            </div>
            <div class="place-order">
                <a href="orders.html">
                    <button>
                        <p>Returns</p>
                        <p>& Orders</p>
                    </button>
                </a>
            </div>
            <div class="cart">
                <a href="../Amazon-Clone/checkout.html">
                    <button>
                        <img src="images/icons/cart-icon.png" alt="Cart">
                        <span class="cart-count">0</span>
                    </button>
                </a>
            </div>            
        </div>
        <div class="products">
        </div>
        <div class="footer">
        </div>
    </div>
    <script type="module" src="js/Amazon.js"></script>
</body>
</html>
